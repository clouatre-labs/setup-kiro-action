name: AI Analysis - Balanced Security
on: [pull_request]

permissions:
  id-token: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Kiro CLI
        uses: clouatre-labs/setup-kiro-action@v1
        with:
          enable-sigv4: true
          aws-region: us-east-1

      - name: Generate Diff Stats
        run: git diff --stat origin/${{ github.base_ref }}...HEAD > diff-stats.txt

      - name: AI Analysis of Diff Stats
        run: |
          echo "Review these changes:" > prompt.txt
          cat diff-stats.txt >> prompt.txt
          kiro-cli-chat chat --no-interactive "$(cat prompt.txt)" 2>/dev/null > review.md

      - name: Upload Review Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ai-review
          path: review.md

  post:
    needs: analyze
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      pull-requests: write
    steps:
      - name: Download Review Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ai-review

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.md', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
