name: AI Analysis - Balanced Security
on: [pull_request]

permissions:
  id-token: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Kiro CLI
        uses: clouatre-labs/setup-kiro-action@91393ee22956aee30d31f53abc8d37ac69e02102  # v1.0.1
        with:
          enable-sigv4: true
          aws-region: us-east-1

      - name: Generate Diff Stats
        run: git diff --stat origin/${{ github.base_ref }}...HEAD > diff-stats.txt

      - name: AI Analysis of Diff Stats
        run: |
          echo "Review these changes:" > prompt.txt
          cat diff-stats.txt >> prompt.txt
          kiro-cli-chat chat --no-interactive "$(cat prompt.txt)" 2>/dev/null > review.md

      - name: Upload Review Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ai-review
          path: review.md

  post:
    needs: analyze
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      pull-requests: write
    steps:
      - name: Download Review Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ai-review

      - name: Post Review Comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.md', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
