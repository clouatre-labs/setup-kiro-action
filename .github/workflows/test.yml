name: Test Action

on:
  push:
    branches: [main]
    paths:
      - 'action.yml'
      - 'src/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-ubuntu-x64:
    name: Test on Ubuntu x64
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Test action
        uses: ./
        id: kiro

      - name: Verify installation
        run: |
          echo "Kiro version: ${{ steps.kiro.outputs.kiro-version }}"
          echo "Kiro path: ${{ steps.kiro.outputs.kiro-path }}"
          kiro-cli-chat --version

      - name: Test kiro-cli-chat command
        run: |
          which kiro-cli-chat
          kiro-cli-chat --help

  test-cache:
    name: Test caching
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: First run (cache miss)
        uses: ./

      - name: Remove binaries
        run: rm -f ~/.local/bin/kiro-cli-chat

      - name: Second run (cache hit)
        uses: ./

      - name: Verify cache worked
        run: |
          kiro-cli-chat --version

  test-sigv4-config:
    name: Test SIGV4 configuration
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Test with SIGV4 enabled
        uses: ./
        with:
          enable-sigv4: true
          aws-region: ca-central-1

      - name: Verify SIGV4 environment variables
        run: |
          if [ "$AMAZON_Q_SIGV4" != "true" ]; then
            echo "ERROR: AMAZON_Q_SIGV4 not set correctly"
            exit 1
          fi
          if [ "$AWS_REGION" != "ca-central-1" ]; then
            echo "ERROR: AWS_REGION not set correctly"
            exit 1
          fi
          echo "SIGV4 configuration verified"
          kiro-cli-chat --version

  test-checksum-verification:
    name: Test SHA256 verification
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Test with verification enabled
        uses: ./
        with:
          verify-checksum: true

      - name: Verify installation
        run: |
          kiro-cli-chat --version
          echo "Checksum verification passed"

  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false
          annotations: true
          min-severity: error

  ci-result:
    name: CI Result
    runs-on: ubuntu-24.04
    if: always()
    needs: [test-ubuntu-x64, test-cache, test-sigv4-config, test-checksum-verification, zizmor]
    permissions: {}
    steps:
      - name: Verify all jobs passed or were skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All CI jobs passed or were skipped."
