name: 'Setup Kiro CLI'
description: 'Install and cache Kiro CLI (formerly Amazon Q Developer CLI) for GitHub Actions workflows'
author: 'Hugues Clouâtre'

keywords:
  - ai
  - kiro
  - kiro-cli
  - aws
  - cli
  - automation

inputs:
  version:
    description: 'Kiro CLI version to install'
    required: false
    default: '1.28.1'
  aws-region:
    description: 'AWS region for Kiro CLI operations'
    required: false
    default: 'us-east-1'
  enable-sigv4:
    description: 'Enable SIGV4 authentication mode'
    required: false
    default: 'false'
  verify-checksum:
    description: 'Verify SHA256 checksum of downloaded binary'
    required: false
    default: 'true'
  musl:
    description: 'Use musl-linked binary for older glibc environments (e.g. Alpine Linux)'
    required: false
    default: 'false'
  seed-token-cache:
    description: 'Pre-populate ~/.local/share/kiro-cli/data.sqlite3 with auth tokens for headless operation without KIRO_API_KEY'
    required: false
    default: 'false'
  kiro-refresh-token:
    description: 'Kiro refresh token (from one-time manual login). Required when seed-token-cache is true.'
    required: false
    default: ''
  kiro-client-id:
    description: 'Kiro OAuth client ID (from device registration). Required when seed-token-cache is true.'
    required: false
    default: ''
  kiro-client-secret:
    description: 'Kiro OAuth client secret (from device registration). Required when seed-token-cache is true.'
    required: false
    default: ''
  kiro-sso-region:
    description: 'AWS region used during initial Kiro login (for SSO token endpoint).'
    required: false
    default: 'us-east-1'

outputs:
  kiro-version:
    description: 'Installed Kiro CLI version'
    value: ${{ steps.install.outputs.version }}
  kiro-path:
    description: 'Path to Kiro CLI binary directory'
    value: ${{ steps.setup-path.outputs.path }}

runs:
  using: 'composite'
  steps:
    - name: Check platform support
      shell: bash
      run: |
        OS="${{ runner.os }}"
        if [ "$OS" != "Linux" ]; then
          echo "::error::Kiro CLI action only supports Linux runners. Use the official install script for macOS: curl -fsSL https://cli.kiro.dev/install | bash"
          exit 1
        fi

    - name: Validate token cache inputs
      if: inputs.seed-token-cache == 'true'
      shell: bash
      run: |
        MISSING=""
        if [ -z "${{ inputs.kiro-refresh-token }}" ]; then
          MISSING="$MISSING kiro-refresh-token"
        fi
        if [ -z "${{ inputs.kiro-client-id }}" ]; then
          MISSING="$MISSING kiro-client-id"
        fi
        if [ -z "${{ inputs.kiro-client-secret }}" ]; then
          MISSING="$MISSING kiro-client-secret"
        fi
        if [ -n "$MISSING" ]; then
          echo "::error::seed-token-cache is true but the following required inputs are missing:$MISSING"
          exit 1
        fi

    - name: Cache Kiro CLI binaries
      id: cache-kiro
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: ~/.local/bin/kiro-cli-chat
        key: kiro-${{ inputs.version }}-${{ runner.os }}-${{ runner.arch }}-${{ inputs.musl == 'true' && 'musl' || 'glibc' }}

    - name: Install Kiro CLI
      id: install
      if: steps.cache-kiro.outputs.cache-hit != 'true'
      shell: bash
      run: | # zizmor: ignore[template-injection]
        echo "::group::Installing Kiro CLI ${{ inputs.version }}"
        mkdir -p ~/.local/bin
        
        # Determine architecture
        ARCH="${{ runner.arch }}"
        if [ "$ARCH" = "X64" ]; then
          KIRO_ARCH="x86_64"
        elif [ "$ARCH" = "ARM64" ]; then
          KIRO_ARCH="aarch64"
        else
          echo "::error::Unsupported architecture: $ARCH"
          exit 1
        fi
        
        # Download URL (Linux only, versioned path)
        MUSL_SUFFIX=""
        if [ "${{ inputs.musl }}" = "true" ]; then
          MUSL_SUFFIX="-musl"
        fi
        DOWNLOAD_URL="https://desktop-release.q.us-east-1.amazonaws.com/${{ inputs.version }}/kirocli-${KIRO_ARCH}-linux${MUSL_SUFFIX}.zip"
        echo "Downloading from: $DOWNLOAD_URL"
        
        # Download and extract
        curl --proto '=https' --tlsv1.2 -sSfL "$DOWNLOAD_URL" -o kiro.zip
        
        # Verify checksum if requested
        if [ "${{ inputs.verify-checksum }}" = "true" ]; then
          echo "Downloading SHA256 checksum..."
          curl --proto '=https' --tlsv1.2 -sSfL "${DOWNLOAD_URL}.sha256" -o kiro.zip.sha256
          
          EXPECTED_SHA=$(cat kiro.zip.sha256)
          ACTUAL_SHA=$(shasum -a 256 kiro.zip | cut -d' ' -f1)
          
          if [ "$EXPECTED_SHA" != "$ACTUAL_SHA" ]; then
            echo "::error::SHA256 mismatch! Expected: $EXPECTED_SHA, Got: $ACTUAL_SHA"
            exit 1
          fi
          echo "SHA256 verification passed"
        fi
        
        unzip -q kiro.zip
        
        # Get actual version from BUILD-INFO if available
        if [ -f kirocli/BUILD-INFO ]; then
          ACTUAL_VERSION=$(grep '^BUILD_VERSION=' kirocli/BUILD-INFO | cut -d= -f2)
          echo "version=${ACTUAL_VERSION}" >> $GITHUB_OUTPUT
        else
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
        fi
        
        # Copy only kiro-cli-chat binary (sufficient for CI/CD)
        cp kirocli/bin/kiro-cli-chat ~/.local/bin/
        chmod +x ~/.local/bin/kiro-cli-chat
        
        # Cleanup
        rm -rf kirocli kiro.zip
        
        echo "::endgroup::"

    - name: Setup PATH
      id: setup-path
      shell: bash
      run: | # zizmor: ignore[github-env]
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        echo "path=$HOME/.local/bin" >> $GITHUB_OUTPUT

    - name: Seed token cache
      if: inputs.seed-token-cache == 'true'
      shell: bash
      run: | # zizmor: ignore[template-injection]
        echo "::add-mask::${{ inputs.kiro-refresh-token }}"
        echo "::add-mask::${{ inputs.kiro-client-id }}"
        echo "::add-mask::${{ inputs.kiro-client-secret }}"

        # Ensure sqlite3 is available
        if ! command -v sqlite3 &>/dev/null; then
          echo "::error::sqlite3 is required for token cache seeding but was not found on the runner."
          exit 1
        fi

        DB_DIR="$HOME/.local/share/kiro-cli"
        DB_PATH="$DB_DIR/data.sqlite3"
        mkdir -p "$DB_DIR"

        REFRESH_TOKEN="${{ inputs.kiro-refresh-token }}"
        CLIENT_ID="${{ inputs.kiro-client-id }}"
        CLIENT_SECRET="${{ inputs.kiro-client-secret }}"
        REGION="${{ inputs.kiro-sso-region }}"

        sqlite3 "$DB_PATH" "CREATE TABLE IF NOT EXISTS auth_kv (key TEXT PRIMARY KEY, value TEXT);"

        DEVICE_REG=$(printf '{"client_id":"%s","client_secret":"%s","region":"%s"}' \
          "$CLIENT_ID" "$CLIENT_SECRET" "$REGION")
        TOKEN_REC=$(printf '{"access_token":"expired","refresh_token":"%s","expires_at":"2020-01-01T00:00:00Z","region":"%s"}' \
          "$REFRESH_TOKEN" "$REGION")

        sqlite3 "$DB_PATH" \
          "INSERT OR REPLACE INTO auth_kv (key, value) VALUES ('kirocli:odic:device-registration', '$DEVICE_REG');"
        sqlite3 "$DB_PATH" \
          "INSERT OR REPLACE INTO auth_kv (key, value) VALUES ('kirocli:odic:token', '$TOKEN_REC');"

        echo "Token cache seeded at $DB_PATH"

    - name: Configure SIGV4 authentication
      if: inputs.enable-sigv4 == 'true'
      shell: bash
      run: | # zizmor: ignore[github-env,template-injection]
        echo "::warning::SIGV4 authentication (AMAZON_Q_SIGV4) is not yet implemented in kiro-cli-chat. The environment variable will be set but has no effect. Track upstream progress at https://github.com/kirodotdev/Kiro/issues/5938. For working SIGV4 support, use clouatre-labs/setup-q-cli-action instead."
        echo "AMAZON_Q_SIGV4=1" >> $GITHUB_ENV
        echo "AWS_REGION=${{ inputs.aws-region }}" >> $GITHUB_ENV

    - name: Verify installation
      shell: bash
      run: |
        echo "::group::Verifying Kiro CLI installation"
        kiro-cli-chat --version
        echo "Installed binary:"
        ls -lh ~/.local/bin/kiro-cli-chat
        echo "::endgroup::"

branding:
  icon: 'terminal'
  color: 'purple'
